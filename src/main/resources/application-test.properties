# Test profile - use H2 in-memory database
spring.datasource.url=jdbc:h2:mem:be_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration for test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable validation warnings
spring.jpa.properties.hibernate.check_nullability=false

# Dummy Cloudflare R2 config for tests
cloudflare.r2.account-id=test-account
cloudflare.r2.access-key=test-access-key
cloudflare.r2.secret-key=test-secret-key
cloudflare.r2.bucket-name=test-bucket
cloudflare.r2.endpoint=https://test-account.r2.cloudflarestorage.com
cloudflare.r2.domain=https://cdn.example.com

